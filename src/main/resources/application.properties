spring.application.name=pulse

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5433/pulse
spring.datasource.username=pulse
spring.datasource.password=pulse
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── AWS / LocalStack ──────────────────────────────────────────────────────────
aws.region=us-east-1
aws.endpoint=http://localhost:4566
aws.accessKeyId=test
aws.secretKey=test
aws.sns.topicArn=arn:aws:sns:us-east-1:000000000000:pulse-notifications
aws.sqs.emailQueueUrl=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/email-queue
aws.sqs.smsQueueUrl=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/sms-queue

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
